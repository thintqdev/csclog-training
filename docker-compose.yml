version: "3.9"

services:
  api:
    build: .
    image: csclog-api:latest
    ports:
      - "8000:8000"
    environment:
      PROJECT_ROOT: /app
      OS_TYPES: linux,windows,mac,network
      TOP_K: 1
      ANOMALY_RATE: 1
      MODEL_VARIANT: full
      FT_HID_SIZE: 64
      LSTM_HID_SIZE: 64
      MLP_HID_SIZE: 64
      GCN_HID_SIZE: 64
      OUT_HID_SIZE: 64
      ALPHA: 0.8
      FT_PATTERN: 1
      NUM_LAYERS: 2
    volumes:
      - ./checkpoints:/app/checkpoints:ro
      - ./data/sequences:/app/data/sequences:ro
    command: >
      uvicorn src.serve.app:app
      --host 0.0.0.0
      --port 8000
      --workers 1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  mlflow:
    image: python:3.10-slim
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
    command: >
      sh -c "pip install mlflow --quiet &&
             mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri file:///mlruns"
